<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.container {
    width: 320px;
    margin: 120px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

h2 { text-align: center; }

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

button {
    width: 100%;
    padding: 10px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 5px;
}

.error {
    color: red;
    text-align: center;
}
</style>
</head>

<body>
<div class="container">
    <h2>Iniciar sesión</h2>

    <form method="POST" action="/login">
        <input type="text" name="usuario" placeholder="Usuario" required>
        <input type="password" name="clave" placeholder="Contraseña" required>
        <button>Ingresar</button>
    </form>

    <div class="error">{{ mensaje }}</div>
</div>
</body>
</html>
