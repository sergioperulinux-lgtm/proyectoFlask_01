<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* CONTENEDOR CON IMAGEN */
.fondo {
    position: fixed;
    width: 100%;
    height: 100%;

    background-image: url("https://www.unfv.edu.pe/images/sliders/principal/2023/slider_unfv_anime.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* CAPA OSCURA */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

/* LOGIN */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    width: 350px;
    padding: 30px;

    background: rgba(255,255,255,0.95);
    border-radius: 12px;

    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

h2 {
    text-align: center;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
}

button {
    width: 100%;
    padding: 12px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 6px;
}

.error {
    color: red;
    text-align: center;
}
</style>
</head>

<body>

<div class="fondo"></div>
<div class="overlay"></div>

<div class="container">
    <h2>Iniciar sesión</h2>

    <form method="POST" action="/login">
        <input type="text" name="usuario" placeholder="Usuario" required>
        <input type="password" name="clave" placeholder="Contraseña" required>
        <button>Ingresar</button>
    </form>

    <div class="error">{{ mensaje }}</div>
</div>

</body>
</html>
