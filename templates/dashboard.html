<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 200px);
    gap: 20px;
    justify-content: center;
    margin-top: 60px;
}

.card {
    background: white;
    padding: 30px;
    text-align: center;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    background: #e3e9ff;
}

a {
    text-decoration: none;
    color: black;
}
</style>
</head>

<body>

<h1 style="text-align:center;">Dashboard</h1>

<div class="grid">
    <a href="/generador"><div class="card">🤖 Generador</div></a>
    <a href="/calculadora"><div class="card">🧮 Calculadora</div></a>
    <a href="/tareas"><div class="card">📅 Tareas</div></a>
    <a href="/chat"><div class="card">💬 Chat</div></a>
    <a href="/panel"><div class="card">📊 Panel</div></a>
</div>

</body>
</html>
