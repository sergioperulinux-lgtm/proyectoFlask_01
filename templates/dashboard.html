<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body { font-family: Arial; background: #f4f6f9; text-align: center; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 50px; }
        .card {
            width: 200px; height: 120px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }
        .card:hover { transform: scale(1.05); background: #e3f2fd; }
        a { text-decoration: none; color: black; }
    </style>
</head>
<body>

<h1>Dashboard</h1>

<div class="container">
    <a href="/categorias"><div class="card">📚 Categorías</div></a>
    <a href="/cursos"><div class="card">📘 Cursos</div></a>
    <a href="/paginas"><div class="card">📄 Páginas</div></a>
    <a href="/perfil"><div class="card">👤 Perfil</div></a>
</div>

</body>
</html>
